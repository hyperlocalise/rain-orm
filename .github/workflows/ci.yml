name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  precommit:
    name: Precommit Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run precommit
        run: make precommit

  integration:
    name: SQLite Integration Tests
    runs-on: ubuntu-latest
    needs: [precommit]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run SQLite integration tests
        run: go test -race ./pkg/rain -run '^TestSQLiteIntegration'

      - name: Run SQLite CLI integration tests
        run: go test -race ./internal/raincli -run '^TestSQLiteCLIIntegrationGenerateCheckMigrate$'

  postgres-integration:
    name: Postgres Integration Tests
    runs-on: ubuntu-latest
    needs: [precommit]
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rain_test
          POSTGRES_USER: rain
          POSTGRES_PASSWORD: rain
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rain -d rain_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run Postgres integration tests
        env:
          RAIN_POSTGRES_DSN: postgres://rain:rain@127.0.0.1:5432/rain_test?sslmode=disable
        run: go test -race ./pkg/rain -run '^TestPostgresIntegration'

      - name: Run Postgres CLI integration tests
        env:
          RAIN_POSTGRES_DSN: postgres://rain:rain@127.0.0.1:5432/rain_test?sslmode=disable
        run: go test -race ./internal/raincli -run '^TestPostgresCLIIntegrationGenerateCheckMigrate$'

  mysql-integration:
    name: MySQL Integration Tests
    runs-on: ubuntu-latest
    needs: [precommit]
    timeout-minutes: 10
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: rain_test
          MYSQL_USER: rain
          MYSQL_PASSWORD: rain
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -urain -prain"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run MySQL integration tests
        env:
          RAIN_MYSQL_DSN: rain:rain@tcp(127.0.0.1:3306)/rain_test?parseTime=true
        run: go test -race ./pkg/rain -run '^TestMySQLIntegration'
