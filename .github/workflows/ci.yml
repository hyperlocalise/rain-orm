name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  precommit:
    name: Precommit Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run precommit
        run: make precommit
